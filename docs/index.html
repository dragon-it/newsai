<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewSai - AI Daily Report</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">NewSai 🤖</div>
        <h1>AI 데일리 리포트</h1>
        <p class="date">발행일: <span id="report-date">{{DATE}}</span></p>
        <div class="actions">
          <a href="report.pdf" class="btn-download" download
            >PDF 리포트 다운로드</a
          >
        </div>
      </header>

      <main>
        <section class="summary-section">
          <h2>오늘의 요약</h2>
          <div class="summary-content">{{SUMMARY}}</div>
        </section>

        <section class="news-section">
          <h2>주요 뉴스 목록</h2>
          <div class="news-list">
            <!-- 뉴스 아이템 반복 구간 -->
            {{NEWS_ITEMS}}
            <!-- 예시: <div class="news-card">
                        <span class="pub-date">2026-05-19</span>
                        <h3><a href="#">뉴스 제목</a></h3>
                        <p>뉴스 간략 설명...</p>
                    </div> -->
          </div>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 NewSai Automation. Generated by LLM.</p>
        <p>
          <a href="https://github.com/username/newsai">GitHub Repository</a>
        </p>
      </footer>
    </div>
  </body>
</html>
