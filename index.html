<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewSai AI 뉴스 대시보드</title>
    <style>
      :root {
        --primary: #2a5298;
        --bg: #f4f7f6;
        --text: #333;
        --card-bg: #fff;
      }
      body {
        font-family: "Malgun Gothic", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      header {
        text-align: center;
        margin-bottom: 40px;
      }
      .summary-card {
        background: var(--card-bg);
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        margin-bottom: 30px;
        border-left: 8px solid var(--primary);
      }
      .news-list {
        display: grid;
        gap: 15px;
      }
      .news-item {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        transition: transform 0.2s;
      }
      .news-item:hover {
        transform: translateY(-3px);
      }
      .news-item a {
        text-decoration: none;
        color: var(--primary);
        font-weight: bold;
        font-size: 1.1rem;
      }
      .date {
        font-size: 0.85rem;
        color: #888;
        margin-top: 5px;
      }
      #last-updated {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🤖 NewSai AI 뉴스 대시보드</h1>
        <p>리포트 생성일: <span id="last-updated">로딩 중...</span></p>
      </header>

      <section class="summary-card">
        <h2>📝 AI 요약 리포트</h2>
        <div id="summary-content">데이터를 불러오는 중입니다...</div>
      </section>

      <section>
        <h2>📰 주요 뉴스 목록</h2>
        <div id="news-list" class="news-list"></div>
      </section>
    </div>

    <script>
      // 왜 fetch인가? 생성된 data.json을 동적으로 읽어와 HTML을 구성하기 위함입니다.
      async function loadDashboard() {
        try {
          const response = await fetch("./data.json");
          const data = await response.json();

          document.getElementById("last-updated").textContent = data.reportDate;
          document.getElementById("summary-content").innerHTML =
            data.summary.replace(/\n/g, "<br>");

          const newsHtml = data.news
            .map(
              (item) => `
                    <div class="news-item">
                        <a href="${item.link}" target="_blank">${item.title}</a>
                        <div class="date">${item.pubDate}</div>
                    </div>
                `,
            )
            .join("");
          document.getElementById("news-list").innerHTML = newsHtml;
        } catch (e) {
          console.error("데이터 로드 실패:", e);
          document.getElementById("summary-content").textContent =
            "데이터를 불러오는 데 실패했습니다. 파이프라인(node test/test-pipeline.js)을 먼저 실행해 주세요.";
        }
      }
      loadDashboard();
    </script>
  </body>
</html>
